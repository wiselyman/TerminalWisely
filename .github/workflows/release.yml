name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon + Intel in one job (sequential) to avoid rust-cache races
          - platform: macos-latest
            target: macos
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          # Linux — x86_64
          - platform: ubuntu-22.04
            target: linux-x86_64
            args: --bundles deb,rpm,appimage
            rust_targets: ""
            linux_env: true
          # Linux — ARM64 (deb/rpm; AppImage on aarch64 is unreliable with linuxdeploy)
          - platform: ubuntu-22.04-arm
            target: linux-aarch64
            args: --bundles deb,rpm
            rust_targets: ""
            linux_env: true
          # Windows — x86_64
          - platform: windows-latest
            target: windows-x86_64
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis
            rust_targets: x86_64-pc-windows-msvc
          # Windows — ARM64 (MSI does not support ARM64; NSIS only)
          - platform: windows-latest
            target: windows-aarch64
            args: --target aarch64-pc-windows-msvc --bundles nsis
            rust_targets: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libssl-dev \
            libfuse2 \
            file \
            fakeroot

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare release body
        id: release_body
        shell: bash
        run: |
          {
            cat RELEASE_NOTES.md
            echo ""
            echo "## 安装包说明"
            echo ""
            echo "| 平台 | 格式 |"
            echo "|------|------|"
            echo "| macOS (Apple Silicon) | \`.dmg\` |"
            echo "| macOS (Intel) | \`.dmg\` |"
            echo "| Linux x86_64 | \`.deb\` \`.rpm\` \`.AppImage\` |"
            echo "| Linux ARM64 | \`.deb\` \`.rpm\` |"
            echo "| Windows x86_64 | \`.msi\` \`.exe\` (NSIS) |"
            echo "| Windows ARM64 | \`.exe\` (NSIS) |"
          } > release-body.md
          delimiter="$(openssl rand -hex 16)"
          echo "body<<${delimiter}" >> "$GITHUB_OUTPUT"
          cat release-body.md >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Build and upload release (macOS Apple Silicon)
        if: matrix.target == 'macos'
        id: tauri_mac_arm
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: TerminalWisely v__VERSION__
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin --bundles app,dmg

      - name: Build and upload release (macOS Intel)
        if: matrix.target == 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ steps.tauri_mac_arm.outputs.releaseId }}
          args: --target x86_64-apple-darwin --bundles app,dmg
          retryAttempts: 1

      - name: Build and upload release
        if: matrix.target != 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: ${{ matrix.linux_env && 'true' || '' }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.linux_env && '1' || '' }}
        with:
          tagName: v__VERSION__
          releaseName: TerminalWisely v__VERSION__
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
